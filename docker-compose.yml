services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fact-checker-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factchecker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factchecker}
      POSTGRES_DB: ${POSTGRES_DB:-factchecker}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factchecker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: fact-checker-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"

volumes:
  pgdata:
