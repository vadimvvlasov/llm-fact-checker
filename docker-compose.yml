services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fact-checker-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factchecker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factchecker}
      POSTGRES_DB: ${POSTGRES_DB:-factchecker}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factchecker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: fact-checker-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"

  ui:
    build: .
    container_name: fact-checker-ui
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8501:8501"
    command: uv run streamlit run app.py --server.address 0.0.0.0

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: fact-checker-airflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # image's own /entrypoint (runs for any command, including `standalone`)
      # creates/resets this admin user from these vars before exec'ing.
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
    volumes:
      - airflow_home:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./ingest:/opt/airflow/ingest
    ports:
      - "8080:8080"
    command: standalone

volumes:
  pgdata:
  airflow_home:
